<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Asistente de Honorarios · Ley 27.423</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f5f9fc;
            margin: 0;
            padding: 20px;
            line-height: 1.5;
            color: #1a3e50;
        }
        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .header {
            background: #2c6e8f;
            color: white;
            padding: 24px 28px;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .progress-bar {
            display: flex;
            justify-content: space-between;
            background: #fff;
            padding: 12px 28px;
            border-bottom: 1px solid #e0eef4;
            flex-wrap: wrap;
            gap: 8px;
        }
        .step-dot {
            background: #e4edf2;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2c6e8f;
        }
        .step-dot.active {
            background: #2c6e8f;
            color: white;
        }
        .pantalla {
            display: none;
            padding: 28px 32px;
        }
        .active {
            display: block;
        }
        .card-info, .legal-box, .warning-box, .summary-box {
            padding: 18px;
            border-radius: 20px;
            margin: 20px 0;
            font-size: 0.9rem;
        }
        .warning-box {
            background: #fef5e8;
            border-left: 5px solid #e67e22;
        }
        .legal-box {
            background: #eef4fa;
            border-left: 4px solid #2c6e8f;
        }
        .card-info {
            background: #f0f7fc;
            border-left: 4px solid #5fa3c1;
        }
        .summary-box {
            background: #eaf7e6;
            border-left: 4px solid #5cb85c;
        }
        .input-ui, select.input-ui {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid #cbdbe2;
            border-radius: 48px;
            font-size: 1rem;
            margin: 10px 0 15px;
            background: white;
            font-family: 'Montserrat', sans-serif;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 26px;
            border: none;
            border-radius: 48px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Montserrat', sans-serif;
        }
        .btn-primary {
            background: #2c6e8f;
            color: white;
        }
        .btn-primary:hover {
            background: #1e526c;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #b7cddb;
            color: #2c6e8f;
        }
        .btn-outline:hover {
            background: #eef4fa;
        }
        .btn-danger {
            background: #d96c6c;
            color: white;
        }
        .btn-danger:hover {
            background: #b55151;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.85rem;
            border-radius: 16px;
            overflow: hidden;
        }
        th, td {
            border: 1px solid #dce5ec;
            padding: 12px 14px;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #eef4fa;
            font-weight: 600;
        }
        .check-group {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        .check-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        @media (max-width: 700px) {
            .pantalla { padding: 20px; }
            .progress-bar { padding: 10px 20px; }
            .step-dot { font-size: 0.7rem; padding: 4px 12px; }
            .header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>Asistente para la regulación de Honorarios · Ley 27.423</h1>
    </div>
    <div class="progress-bar" id="progressBar"></div>
    <div id="pantallas"></div>
</div>

<script>
    // -------------------- CARGA UMA (CSV) --------------------
    let valorUMA = 89875;
    function cargarUMA() {
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8tumvxptTGBCfScMwWxK7r6ATnGfMw061GKGdzfIVyThcSGzUqjI-vcpME1AtykPmjqTq0xdjgc7D/pub?output=csv';
        fetch(url)
            .then(response => response.text())
            .then(data => {
                const filas = data.split('\n');
                const cols = filas[0].split(',');
                let val = cols[1]?.replace(/"/g, '').trim();
                if (val && !isNaN(parseFloat(val))) {
                    valorUMA = parseFloat(val);
                    const inputUMA = document.getElementById('inputUMA');
                    if (inputUMA) inputUMA.value = valorUMA;
                }
            })
            .catch(e => console.warn("Error carga UMA", e));
    }

    // -------------------- NÚCLEO DE CÁLCULO (calc.txt) --------------------
    function calcularHonorariosPorGrupo(basePesos, valorUMA, grupo) {
        if (!basePesos || !valorUMA || valorUMA <= 0) return null;
        let baseEnUMA = basePesos / valorUMA;
        let minComp, maxComp, tituloEscala;
        if (baseEnUMA <= 15) { tituloEscala = "1ª escala (hasta 15 UMA): 22% a 33%"; minComp = baseEnUMA * 0.22; maxComp = baseEnUMA * 0.33; }
        else if (baseEnUMA <= 45) { tituloEscala = "2ª escala (16-45 UMA): 20% a 26%"; minComp = (baseEnUMA-15)*0.20 + 4.95; maxComp = (baseEnUMA-15)*0.26 + 4.95; }
        else if (baseEnUMA <= 90) { tituloEscala = "3ª escala (46-90 UMA): 18% a 24%"; minComp = (baseEnUMA-45)*0.18 + 11.7; maxComp = (baseEnUMA-45)*0.24 + 11.7; }
        else if (baseEnUMA <= 150) { tituloEscala = "4ª escala (91-150 UMA): 17% a 22%"; minComp = (baseEnUMA-90)*0.17 + 21.6; maxComp = (baseEnUMA-90)*0.22 + 21.6; }
        else if (baseEnUMA <= 450) { tituloEscala = "5ª escala (151-450 UMA): 15% a 20%"; minComp = (baseEnUMA-150)*0.15 + 33; maxComp = (baseEnUMA-150)*0.20 + 33; }
        else if (baseEnUMA <= 750) { tituloEscala = "6ª escala (451-750 UMA): 13% a 17%"; minComp = (baseEnUMA-450)*0.13 + 90; maxComp = (baseEnUMA-450)*0.17 + 90; }
        else { tituloEscala = "7ª escala (+750 UMA): 12% a 15%"; minComp = (baseEnUMA-750)*0.12 + 127.5; maxComp = (baseEnUMA-750)*0.15 + 127.5; }

        if (grupo === 'grupo2') { minComp /= 2; maxComp /= 2; }
        else if (grupo === 'grupo3') { minComp /= 4; maxComp /= 4; }
        else if (grupo === 'grupo4') { minComp *= 0.7; maxComp *= 0.7; }
        else if (grupo === 'grupo5') { minComp *= 0.9; maxComp *= 0.9; }
        else if (grupo === 'grupo6') { minComp *= 0.45; maxComp *= 0.45; }

        const auxMin = baseEnUMA * 0.05;
        const auxMax = baseEnUMA * 0.10;
        const etapaUnMin = minComp / 3;
        const etapaUnMax = maxComp / 3;
        const etapaDosMin = minComp * 2 / 3;
        const etapaDosMax = maxComp * 2 / 3;

        return {
            tituloEscala, baseEnUMA,
            patrocinante: { full: { min: minComp, max: maxComp }, uno: { min: etapaUnMin, max: etapaUnMax }, dos: { min: etapaDosMin, max: etapaDosMax } },
            apoderado: { full: { min: minComp * 1.4, max: maxComp * 1.4 }, uno: { min: etapaUnMin * 1.4, max: etapaUnMax * 1.4 }, dos: { min: etapaDosMin * 1.4, max: etapaDosMax * 1.4 } },
            auxMin, auxMax
        };
    }

    // -------------------- ESTADO GLOBAL --------------------
    let wizardState = {
        step: 0,
        valorUMA: 89875,
        tipoProceso: '',
        // contingencias
        modoTerminacion: '',
        sentenciaResultado: null,
        aperturaPrueba: null,
        caducidadCriterio: '',
        tuvoExcepciones: null,
        sucesionUnicoLetrado: false,
        medidaOposicion: null,
        homologacionVivienda: false,
        // configuración de base (objeto del juicio)
        objetoBase: '',
        desalojoVivienda: false,
        // base numérica
        baseValor: 0,
        // provisorio y gestor
        esProvisorio: false,
        etapasRealizadas: 3,
        esGestor: false
    };

    const steps = [
        { id: "inicio", title: "Inicio" },
        { id: "tipoProceso", title: "Tipo de proceso" },
        { id: "contingencias", title: "Contingencias" },
        { id: "objeto", title: "Objeto del juicio" },
        { id: "base", title: "Base" },
        { id: "resultado", title: "Resultado" }
    ];

    // Helper: muestra resumen de elecciones previas
    function getSummaryText() {
        let lines = [];
        if (wizardState.tipoProceso) {
            let tipoDesc = "";
            switch(wizardState.tipoProceso) {
                case "conocimiento": tipoDesc = "De conocimiento (ordinario / sumarísimo)"; break;
                case "ejecucion_sentencia": tipoDesc = "Ejecución de sentencia (o de honorarios o acuerdos)"; break;
                case "ejecutivo": tipoDesc = "Ejecutivo (expensas, alquileres, etc.)"; break;
                case "sucesion": tipoDesc = "Sucesión"; break;
                case "exhorto": tipoDesc = "Exhorto"; break;
                case "incidente": tipoDesc = "Incidente (incluye BLSG)"; break;
                case "medida_cautelar": tipoDesc = "Medida cautelar"; break;
                case "homologacion_desocupacion": tipoDesc = "Homologación de convenio de desocupación (y su ejecución)"; break;
                default: tipoDesc = wizardState.tipoProceso;
            }
            lines.push(`Tipo de proceso: ${tipoDesc}`);
        }
        if (wizardState.sucesionUnicoLetrado !== undefined && wizardState.tipoProceso === 'sucesion') {
            lines.push(`Sucesión: ${wizardState.sucesionUnicoLetrado ? "Un solo abogado (reducción 50%)" : "Varios abogados"}`);
        }
        if (wizardState.medidaOposicion !== null && wizardState.tipoProceso === 'medida_cautelar') {
            lines.push(`Medida cautelar: ${wizardState.medidaOposicion ? "Con oposición → 50%" : "Sin oposición → 25%"}`);
        }
        if (wizardState.modoTerminacion) {
            let termDesc = "";
            if (wizardState.modoTerminacion === 'sentencia') termDesc = "Sentencia";
            else if (wizardState.modoTerminacion === 'modos_anormales') termDesc = "Modos anormales (allanamiento, desistimiento, transacción)";
            else if (wizardState.modoTerminacion === 'caducidad') termDesc = "Caducidad";
            lines.push(`Terminación: ${termDesc}`);
            if (wizardState.sentenciaResultado) lines.push(`Resultado: ${wizardState.sentenciaResultado === 'admitida' ? "Demanda admitida" : "Demanda rechazada"}`);
            if (wizardState.aperturaPrueba !== null) lines.push(`Apertura a prueba: ${wizardState.aperturaPrueba ? "Después" : "Antes"}`);
            if (wizardState.caducidadCriterio) lines.push(`Criterio caducidad: ${wizardState.caducidadCriterio === 'art22' ? "Art.22 (desestimada)" : "Art.25 (modo anormal)"}`);
        }
        if (wizardState.tuvoExcepciones !== null && (wizardState.tipoProceso === 'ejecucion_sentencia' || wizardState.tipoProceso === 'ejecutivo')) {
            lines.push(`Excepciones: ${wizardState.tuvoExcepciones ? "Se dedujeron" : "No se dedujeron"}`);
        }
        if (wizardState.objetoBase && wizardState.tipoProceso === 'conocimiento') {
            let objDesc = "";
            switch(wizardState.objetoBase) {
                case "desalojo": objDesc = "Desalojo"; break;
                case "sumas_dinero": objDesc = "Juicios en los que se reclaman sumas de dinero"; break;
                case "inmuebles": objDesc = "Juicios sobre inmuebles o muebles"; break;
                case "derechos_crediticios": objDesc = "Juicio sobre derechos crediticios"; break;
                case "titulos_acciones": objDesc = "Títulos de renta o acciones"; break;
                case "establecimientos": objDesc = "Establecimientos comerciales/industriales/mineros"; break;
                case "uso_habitacion": objDesc = "Derecho de uso o habitación"; break;
                case "escrituracion": objDesc = "Juicio de escrituración"; break;
                default: objDesc = wizardState.objetoBase;
            }
            lines.push(`Objeto: ${objDesc}`);
            if (wizardState.desalojoVivienda && wizardState.objetoBase === 'desalojo') lines.push("Reducción por vivienda: Sí (-20%)");
        }
        if (wizardState.baseValor > 0) lines.push(`Base ingresada: $${wizardState.baseValor.toLocaleString('es-AR')}`);
        if (lines.length === 0) return "";
        return "📋 Resumen de elecciones: " + lines.join(" · ");
    }

    function renderProgress() {
        const container = document.getElementById('progressBar');
        if (!container) return;
        let html = '';
        steps.forEach((s, idx) => {
            const activeClass = (idx === wizardState.step) ? 'active' : '';
            html += `<div class="step-dot ${activeClass}">${s.title}</div>`;
        });
        container.innerHTML = html;
    }

    function renderScreen() {
        const container = document.getElementById('pantallas');
        if (!container) return;
        const step = wizardState.step;
        let html = `<div class="pantalla active" id="screen${step}">`;

        // Mostrar resumen si no es la primera pantalla
        if (step !== 0) {
            const summary = getSummaryText();
            if (summary) html += `<div class="summary-box">${summary}</div>`;
        }

        switch(step) {
            case 0: // INICIO
                html += `
                    <div class="warning-box">
                        <strong>Bienvenido!</strong><br>
                        Este asistente interactivo lo guiará en el proceso de estimación de honorarios mediante la selección de opciones. Antes de comenzar, por favor tenga en cuenta las siguientes consideraciones legales y técnicas:
                    </div>
                    <div class="card-info">
                        <strong>Naturaleza de la herramienta</strong><br>
                        • <strong>Alcance:</strong> Los resultados se basan en interpretaciones de la Ley 27.423 que podrían diferir de su criterio profesional o del aplicado por los tribunales.<br>
                        • <strong>Fundamentación:</strong> En cada paso, intentaremos explicitar el fundamento jurídico y su impacto en el cálculo.<br>
                        • <strong>Limitación de responsabilidad:</strong> Esta herramienta es de carácter referencial; no sustituye el criterio del juez natural de la causa ni debe considerarse un dictamen profesional.
                    </div>
                    <div class="card-info">
                        <strong>Ámbito de aplicación temporal</strong><br>
                        • <strong>Vigencia:</strong> Diseñado para juicios iniciados a partir del 22/12/17.<br>
                        • <strong>Excepciones:</strong> También es aplicable si sigue el criterio de aplicación inmediata a juicios en trámite, o el precedente “Establecimiento Las Marías” (CSJN, 04/09/2018) para etapas con principio de ejecución bajo la nueva ley.
                    </div>
                    <div class="card-info">
                        <strong>Restricciones y exclusiones del cálculo</strong><br>
                        • <strong>Mínimos arancelarios:</strong> El asistente no aplica automáticamente los mínimos de los arts. 58, 61, etc. Si el resultado es menor a dichos mínimos, deberá desestimar el cálculo.<br>
                        • <strong>Reducciones y topes:</strong> No se contemplan las limitaciones por prorrateo (art. 730 CCyCN), reajuste de precio (art. 1255 CCyCN), ejecución hipotecaria especial (art. 60 Ley 24.441) o régimen de vivienda (art. 254 CCyCN / art. 48 Ley 14.394).<br>
                        • <strong>Materias excluidas:</strong> no apto para fueros Penal, Laboral o Familia (alimentos, disolución de sociedad conyugal, etc.).<br>
                        • <strong>Asuntos no susceptibles de apreciación pecuniaria:</strong> para casos sin monto determinado, no es posible un cálculo matemático; se debe recurrir a las pautas del art. 16 y si son aplicables, los mínimos legales.
                    </div>
                    <div class="card-info">
                        <strong>Auxiliares de justicia</strong><br>
                        • <strong>Leyes especiales:</strong> solo se utiliza la Ley 27.423. No se incluyen reglamentaciones específicas de otras profesiones (art. 1, 2° párr.) ni las modificaciones de la Ley 27.802 (Modernización Laboral).<br>
                        • <strong>Excluidos:</strong> no contempla los cálculos de los honorarios de los administradores judiciales o interventores (art. 32) ni partidores (art. 34).<br>
                        • <strong>Mediadores:</strong> tienen normativa propia (Ley 26.589 y Decs. 2536/15 y 696/2025). Puede utilizar nuestra calculadora web
                    </div>
                    <div class="card-info">
                        <strong>Reconvención y acumulación de acciones</strong><br>
                        • <strong>Art. 28:</strong> en estos supuestos, los honorarios se regulan por separado para cada acción. Le sugerimos reiniciar el asistente para cada una de las pretensiones según sus particularidades
                    </div>
                    <div style="margin-top: 25px;">
                        <h3>Valor de la Unidad de Medida Arancelaria (UMA)</h3>
                        <div class="legal-box">Ingresa el valor de la UMA actualizado</div>
                        <input type="number" id="inputUMA" class="input-ui" step="1" value="${wizardState.valorUMA}">
                    </div>
                `;
                break;
            case 1: // Tipo de proceso
                html += `
                    <h3>Seleccione el tipo de proceso</h3>
                    <div class="legal-box">En la Ley 27.423, el tipo de proceso define coeficientes específicos que pueden reducir o incrementar el resultado final del cálculo. Por eso, es fundamental que elijas una de las siguientes opciones:</div>
                    <select id="tipoProcesoSelect" class="input-ui">
                        <option value="">-- Seleccione --</option>
                        <option value="conocimiento">De conocimiento (ordinario / sumarísimo)</option>
                        <option value="ejecucion_sentencia">Ejecución de sentencia (o de honorarios o acuerdos)</option>
                        <option value="ejecutivo">Ejecutivo (expensas, alquileres, etc.)</option>
                        <option value="sucesion">Sucesión</option>
                        <option value="exhorto">Exhorto</option>
                        <option value="incidente">Incidente (incluye BLSG)</option>
                        <option value="medida_cautelar">Medida cautelar</option>
                        <option value="homologacion_desocupacion">Homologación de convenio de desocupación (y su ejecución)</option>
                    </select>
                `;
                break;
            case 2: // Contingencias
                html += `<div id="contingenciasContainer"></div>`;
                break;
            case 3: // Objeto del juicio
                if (wizardState.tipoProceso === 'conocimiento') {
                    html += `
                        <h3>Objeto del juicio</h3>
                        <div class="legal-box">El objeto reclamado en el juicio es un factor determinante para establecer la base regulatoria (o cuantía del asunto) sobre la cual se aplicará la escala de porcentajes para calcular los honorarios. Varía sustancialmente dependiendo del reclamo, si se requieren sumas de dinero u otros bienes (y su naturaleza). Por eso es necesario que elijas una de las siguientes opciones:</div>
                        <select id="objetoBaseSelect" class="input-ui">
                            <option value="">-- Seleccione --</option>
                            <option value="desalojo">Desalojo</option>
                            <option value="sumas_dinero">Juicios en los que se reclaman sumas de dinero</option>
                            <option value="inmuebles">Juicios en los que se discuten cuestiones atinentes a inmuebles o muebles</option>
                            <option value="derechos_crediticios">Juicio sobre derechos crediticios</option>
                            <option value="titulos_acciones">Juicio sobre títulos de renta o acciones</option>
                            <option value="establecimientos">Juicio sobre establecimientos comerciales, industriales o mineros</option>
                            <option value="uso_habitacion">Juicio sobre derecho de uso o habitación</option>
                            <option value="escrituracion">Juicio de escrituración</option>
                        </select>
                        <div id="subObjetoBase"></div>
                    `;
                } else {
                    wizardState.step = 4;
                    renderScreen();
                    return;
                }
                break;
            case 4: // Base
                html += `<div id="baseContainer"></div>`;
                break;
            case 5: // Resultado
                html += `<div id="resultadosDinamicos"></div>`;
                break;
        }

        // Determinar si mostrar el botón "Calcular" (solo si es necesario)
        const showNextButton = !(step === 5 && (wizardState.tipoProceso === 'exhorto' || wizardState.tipoProceso === 'incidente'));
        const resetVisible = (step !== 0) ? '' : 'style="display:none"';
        html += `<div class="btn-group">
            <button class="btn-outline" id="btnBack" style="${step===0?'display:none':''}">◀ Atrás</button>
            ${showNextButton ? `<button class="btn-primary" id="btnNext">${step===5?'Calcular':'Siguiente ▶'}</button>` : ''}
            <button class="btn-danger" id="btnReset" ${resetVisible}>Reiniciar</button>
        </div></div>`;
        container.innerHTML = html;
        attachStepEvents();
        renderProgress();

        // Eventos específicos
        if (step === 0) {
            document.getElementById('inputUMA').addEventListener('change', (e) => {
                wizardState.valorUMA = parseFloat(e.target.value) || 89875;
            });
        } else if (step === 1) {
            const sel = document.getElementById('tipoProcesoSelect');
            sel.value = wizardState.tipoProceso;
            sel.addEventListener('change', (e) => { wizardState.tipoProceso = e.target.value; });
        } else if (step === 2) {
            renderContingencias();
        } else if (step === 3 && wizardState.tipoProceso === 'conocimiento') {
            const selObj = document.getElementById('objetoBaseSelect');
            if (selObj) {
                selObj.value = wizardState.objetoBase;
                selObj.addEventListener('change', (e) => {
                    wizardState.objetoBase = e.target.value;
                    const div = document.getElementById('subObjetoBase');
                    if (wizardState.objetoBase === 'desalojo') {
                        div.innerHTML = `
                            <div class="legal-box">Seleccione el tipo de locación:</div>
                            <select id="tipoLocacion" class="input-ui">
                                <option value="">-- Seleccione --</option>
                                <option value="vivienda">Alquiler para vivienda</option>
                                <option value="otros">Demás casos</option>
                            </select>
                            <div id="locacionMensaje"></div>
                        `;
                        const selLoc = document.getElementById('tipoLocacion');
                        if (selLoc) {
                            selLoc.value = wizardState.desalojoVivienda ? 'vivienda' : (wizardState.desalojoVivienda === false ? 'otros' : '');
                            selLoc.addEventListener('change', (e2) => {
                                const isVivienda = (e2.target.value === 'vivienda');
                                wizardState.desalojoVivienda = isVivienda;
                                const msgDiv = document.getElementById('locacionMensaje');
                                if (isVivienda) {
                                    msgDiv.innerHTML = `<div class="legal-box">En el caso de que el destino del contrato sea para vivienda, el monto de la base se reduce en un 20 %.Cuando llegues al cálculo final, la base que ingreses se encontrará reducida en ese porcentaje<br>
                                    Art. 40: En los procesos de desalojo se fijarán los honorarios de acuerdo con la escala del art. 21, tomando como base el total de los alquileres del contrato. En el caso de que la locación sea para vivienda y/o habitación, tal monto se reducirá en un 20 %</div>`;
                                } else {
                                    msgDiv.innerHTML = '';
                                }
                            });
                            if (selLoc.value === 'vivienda') {
                                const msgDiv = document.getElementById('locacionMensaje');
                                msgDiv.innerHTML = `<div class="legal-box">En el caso de que el destino del contrato sea para vivienda, el monto de la base se reduce en un 20 %.Cuando llegues al cálculo final, la base que ingreses se encontrará reducida en ese porcentaje<br>
                                Art. 40: En los procesos de desalojo se fijarán los honorarios de acuerdo con la escala del art. 21, tomando como base el total de los alquileres del contrato. En el caso de que la locación sea para vivienda y/o habitación, tal monto se reducirá en un 20 %</div>`;
                            }
                        }
                    } else {
                        div.innerHTML = '';
                    }
                });
                selObj.dispatchEvent(new Event('change'));
            }
        } else if (step === 4) {
            renderBase();
        } else if (step === 5) {
            calcularFinal();
        }
    }

                                            <option value="">-- Seleccione --</option>
                                            <option value="antes">Caducidad declarada antes de la apertura a prueba</option>
                                            <option value="despues">Caducidad declarada luego de la apertura a prueba</option>
                                        </select>
                                        <div id="art25Mensaje"></div>`;
                        const selApe = document.getElementById('aperturaPruebaCad');
                        if (selApe) {
                            selApe.value = wizardState.aperturaPrueba === true ? 'despues' : (wizardState.aperturaPrueba === false ? 'antes' : '');
                            selApe.addEventListener('change', (e) => {
                                wizardState.aperturaPrueba = (e.target.value === 'despues');
                                const msgDiv = document.getElementById('art25Mensaje');
                                if (e.target.value === 'antes') msgDiv.innerHTML = `<div class="legal-box">Cuando llegues al cálculo final, los honorarios serán del 50 % de la escala del art. 21</div>`;
                                else msgDiv.innerHTML = '';
                            });
                            if (selApe.value === 'antes') document.getElementById('art25Mensaje').innerHTML = `<div class="legal-box">Cuando llegues al cálculo final, los honorarios serán del 50 % de la escala del art. 21</div>`;
                        }
                    } else {
                        sub.innerHTML = '';
                        wizardState.aperturaPrueba = null;
                    }
                });
                if (critSel.value === 'art22') {
                    const sub = document.getElementById('subCaducidad');
                    if (sub) sub.innerHTML = `<div class="legal-box">Al elegir esta opción, el monto de la base que ingreses en los pasos siguientes, se reducirá en un 30 %</div>`;
                } else if (critSel.value === 'art25') {
                    const sub = document.getElementById('subCaducidad');
                    if (sub) {
                        sub.innerHTML = `<select id="aperturaPruebaCad" class="input-ui">
                                            <option value="">-- Seleccione --</option>
                                            <option value="antes">Caducidad declarada antes de la apertura a prueba</option>
                                            <option value="despues">Caducidad declarada luego de la apertura a prueba</option>
                                        </select>
                                        <div id="art25Mensaje"></div>`;
                        const selApe = document.getElementById('aperturaPruebaCad');
                        if (selApe) {
                            selApe.value = wizardState.aperturaPrueba === true ? 'despues' : (wizardState.aperturaPrueba === false ? 'antes' : '');
                            selApe.addEventListener('change', (e) => {
                                wizardState.aperturaPrueba = (e.target.value === 'despues');
                                const msgDiv = document.getElementById('art25Mensaje');
                                if (e.target.value === 'antes') msgDiv.innerHTML = `<div class="legal-box">Cuando llegues al cálculo final, los honorarios serán del 50 % de la escala del art. 21</div>`;
                                else msgDiv.innerHTML = '';
                            });
                            if (selApe.value === 'antes') document.getElementById('art25Mensaje').innerHTML = `<div class="legal-box">Cuando llegues al cálculo final, los honorarios serán del 50 % de la escala del art. 21</div>`;
                        }
                    }
                }
            }
        } else div.innerHTML = '';
    }

    function recolectarDatos() {
        if (wizardState.step === 0) {
            const input = document.getElementById('inputUMA');
            if (input) wizardState.valorUMA = parseFloat(input.value) || 89875;
        }
        if (wizardState.step === 4) {
            const input = document.getElementById('baseInputNum');
            if (input) wizardState.baseValor = parseFloat(input.value) || 0;
        }
    }

    function determinarGrupo() {
        const tipo = wizardState.tipoProceso;
        if (tipo === 'medida_cautelar') {
            return wizardState.medidaOposicion ? 'grupo2' : 'grupo3';
        }
        if (tipo === 'homologacion_desocupacion') {
            return 'grupo2';
        }
        if (tipo === 'sucesion') {
            return wizardState.sucesionUnicoLetrado ? 'grupo2' : 'grupo1';
        }
        if (tipo === 'ejecutivo') {
            return wizardState.tuvoExcepciones === false ? 'grupo5' : 'grupo1';
        }
        if (tipo === 'ejecucion_sentencia') {
            return wizardState.tuvoExcepciones === false ? 'grupo6' : 'grupo2';
        }
        if (tipo === 'conocimiento') {
            if (wizardState.modoTerminacion === 'sentencia') {
                return wizardState.sentenciaResultado === 'rechazada' ? 'grupo4' : 'grupo1';
            } else if (wizardState.modoTerminacion === 'modos_anormales') {
                return wizardState.aperturaPrueba ? 'grupo1' : 'grupo2';
            } else if (wizardState.modoTerminacion === 'caducidad') {
                if (wizardState.caducidadCriterio === 'art22') return 'grupo4';
                else return wizardState.aperturaPrueba ? 'grupo1' : 'grupo2';
            }
        }
        return 'grupo1';
    }

    function calcularBaseFinal() {
        let base = wizardState.baseValor;
        const tipo = wizardState.tipoProceso;
        if (tipo === 'conocimiento' && wizardState.objetoBase === 'desalojo' && wizardState.desalojoVivienda) {
            base *= 0.8;
        }
        if (tipo === 'homologacion_desocupacion') {
            if (wizardState.homologacionVivienda) base *= 0.8;
            base *= 0.5;
        }
        return base;
    }

    function calcularFinal() {
        recolectarDatos();
        const tipo = wizardState.tipoProceso;
        const uma = wizardState.valorUMA;

        // Exhorto: muestra tabla directa
        if (tipo === 'exhorto') {
            const minA = 3, maxA = 3;
            const minB = 10, maxB = 20;
            const minC = 7, maxC = 30;
            const valA = minA * uma;
            const valBmin = minB * uma;
            const valBmax = maxB * uma;
            const valCmin = minC * uma;
            const valCmax = maxC * uma;
            document.getElementById('resultadosDinamicos').innerHTML = `
                <h3>Exhorto (art. 50)</h3>
                 <table>
                     <tr><th colspan="2">Inc. a) - notificaciones</th></tr>
                     <tr><td>Mínimo 3 UMA</td><td>$${valA.toLocaleString('es-AR')}</td></tr>
                     <tr><th colspan="2">Inc. b) - inscripciones y actos registrales</th></tr>
                     <tr><td>Mínimo: 10 UMA</td><td>$${valBmin.toLocaleString('es-AR')}</td></tr>
                     <tr><td>Máximo: 20 UMA</td><td>$${valBmax.toLocaleString('es-AR')}</td></tr>
                     <tr><th colspan="2">Inc. c) - diligencias de prueba</th></tr>
                     <tr><td>Mínimo: 7 UMA</td><td>$${valCmin.toLocaleString('es-AR')}</td></tr>
                     <tr><td>Máximo: 30 UMA</td><td>$${valCmax.toLocaleString('es-AR')}</td></tr>
                 </table>
                <div class="legal-box">ARTÍCULO 50.- Los honorarios por diligenciamiento de exhortos u oficios contemplados en la ley 22.172 serán regulados de conformidad a las siguientes pautas:
                a) Si se tratare de notificaciones o actos semejantes, los honorarios no podrán ser inferiores a 3 UMA;
                b) Si se solicitaren inscripciones de dominios, hijuelas, testamentos, gravámenes, secuestros, embargos, inhibiciones, inventarios, remates, desalojos, o cualquier otro acto registral, los honorarios se regularán en una escala entre 10 y veinte 20 UMA. (...)
                c) Si se tratare de diligencias de prueba y se hubiera intervenido en su producción o contralor, el juez exhortado regulará los honorarios proporcionalmente a la labor desarrollada, en una escala entre 7 y 30 UMA.</div>`;
            return;
        }
        // Incidente: muestra tabla simple min/max
        if (tipo === 'incidente') {
            const base = wizardState.baseValor;
            const baseUMA = base / uma;
            const minUMA = baseUMA * 0.02;
            const maxUMA = baseUMA * 0.20;
            const minPesos = minUMA * uma;
            const maxPesos = maxUMA * uma;
            document.getElementById('resultadosDinamicos').innerHTML = `
                <div class="summary-box">📋 Resumen del juicio<br>Tipo de proceso: Incidente<br>Base: $${base.toLocaleString('es-AR')}<br>Valor UMA: $${uma.toLocaleString('es-AR')}<br>Base en UMA: ${baseUMA.toFixed(2)}</div>
                <h3>Incidente (art.33 ley 21839)</h3>
                 <table>
                     <tr><th>Concepto</th><th>UMA</th><th>Pesos ($)</th></tr>
                     <tr><td>Mínimo (2%)</td><td>${minUMA.toFixed(2)}</td><td>$${minPesos.toLocaleString('es-AR')}</td></tr>
                     <tr><td>Máximo (20%)</td><td>${maxUMA.toFixed(2)}</td><td>$${maxPesos.toLocaleString('es-AR')}</td></tr>
                 </table>
                <div class="legal-box">Tener en cuenta que según el inc. g) del art. 29, “los incidentes se dividirán en 2 etapas; la primera se compone del planteo que lo origine, sea verbal o escrito, y la segunda, del desarrollo hasta su conclusión”.</div>`;
            return;
        }

        // Medida cautelar: tabla simplificada sin etapas, sin checkboxes, sin auxiliares
        if (tipo === 'medida_cautelar') {
            const grupo = determinarGrupo();
            let baseFinal = wizardState.baseValor;
            if (baseFinal <= 0) { alert("Base inválida"); return; }
            const calc = calcularHonorariosPorGrupo(baseFinal, uma, grupo);
            if (!calc) return;
            document.getElementById('resultadosDinamicos').innerHTML = `
                <div class="summary-box">📋 Resumen del juicio<br>Tipo de proceso: Medida cautelar<br>Base: $${baseFinal.toLocaleString('es-AR')}<br>Valor UMA: $${uma.toLocaleString('es-AR')}<br>Base en UMA: ${calc.baseEnUMA.toFixed(2)}<br>Escala: ${calc.tituloEscala}</div>
                <h4>Patrocinante</h4>
                 <table>
                     <tr><th>Concepto</th><th>Mínimo UMA</th><th>Máximo UMA</th><th>Mínimo $</th><th>Máximo $</th></tr>
                     <tr><td>Honorarios</td><td>${calc.patrocinante.full.min.toFixed(2)}</td><td>${calc.patrocinante.full.max.toFixed(2)}</td>
                         <td>$${(calc.patrocinante.full.min * uma).toLocaleString('es-AR')}</td><td>$${(calc.patrocinante.full.max * uma).toLocaleString('es-AR')}</td></tr>
                 </table>
                <h4>Apoderado (+40%)</h4>
                 <table>
                     <tr><th>Concepto</th><th>Mínimo UMA</th><th>Máximo UMA</th><th>Mínimo $</th><th>Máximo $</th></tr>
                     <tr><td>Honorarios</td><td>${calc.apoderado.full.min.toFixed(2)}</td><td>${calc.apoderado.full.max.toFixed(2)}</td>
                         <td>$${(calc.apoderado.full.min * uma).toLocaleString('es-AR')}</td><td>$${(calc.apoderado.full.max * uma).toLocaleString('es-AR')}</td></tr>
                 </table>`;
            return;
        }

        // Resto de casos (conocimiento, ejecución sentencia, ejecutivo, sucesión, homologación)
        const grupo = determinarGrupo();
        let baseFinal = calcularBaseFinal();
        if (baseFinal <= 0) { alert("Base inválida"); return; }
        const calc = calcularHonorariosPorGrupo(baseFinal, uma, grupo);
        if (!calc) return;

        const esProvisorio = wizardState.esProvisorio;
        const esGestor = wizardState.esGestor;
        let etapasFactor = 1;
        if (esProvisorio) {
            let etapas = prompt("Honorarios provisorios (art.12). ¿Cuántas etapas cumplió?\n1 - Una etapa (1/3)\n2 - Dos etapas (2/3)\n3 - Todas las etapas");
            if (etapas === '1') etapasFactor = 1/3;
            else if (etapas === '2') etapasFactor = 2/3;
            else etapasFactor = 1;
        }

        let html = `<div class="check-group">
            <label><input type="checkbox" id="chkProvisorio" ${esProvisorio ? 'checked' : ''}> Los honorarios son provisorios (art.12)</label>
            <label><input type="checkbox" id="chkGestor" ${esGestor ? 'checked' : ''}> Actuó como gestor (art.42) → +4% patrocinante</label>
        </div>`;
        html += `<div class="summary-box">📋 Resumen del juicio<br>Tipo de proceso: ${wizardState.tipoProceso}<br>Base final: $${baseFinal.toLocaleString('es-AR')}<br>Valor UMA: $${uma.toLocaleString('es-AR')}<br>Base en UMA: ${calc.baseEnUMA.toFixed(2)}<br>Escala: ${calc.tituloEscala}</div>`;

        function mostrarFila(etiqueta, minUMA, maxUMA, minPesos, maxPesos, aplicarGestor=false) {
            if (esProvisorio) {
                const valMin = minUMA * etapasFactor;
                const valPesos = valMin * uma;
                if (aplicarGestor && esGestor) {
                    const valGestor = valMin * 1.04;
                    const pesosGestor = valGestor * uma;
                    return `<tr><td>${etiqueta}</td><td>${valMin.toFixed(2)}</td><td>$${valPesos.toLocaleString('es-AR')}</td><td>${valGestor.toFixed(2)}</td><td>$${pesosGestor.toLocaleString('es-AR')}</td></tr>`;
                }
                return `<tr><td>${etiqueta}</td><td>${valMin.toFixed(2)}</td><td>$${valPesos.toLocaleString('es-AR')}</td><td>-</td><td>-</td></tr>`;
            } else {
                if (aplicarGestor && esGestor) {
                    const minG = minUMA * 1.04;
                    const maxG = maxUMA * 1.04;
                    return `<tr><td>${etiqueta}</td><td>${minUMA.toFixed(2)} / ${minG.toFixed(2)}</td><td>${maxUMA.toFixed(2)} / ${maxG.toFixed(2)}</td>
                        <td>$${(minUMA*uma).toLocaleString('es-AR')} / $${(minG*uma).toLocaleString('es-AR')}</td>
                        <td>$${(maxUMA*uma).toLocaleString('es-AR')} / $${(maxG*uma).toLocaleString('es-AR')}</td></tr>`;
                }
                return `<tr><td>${etiqueta}</td><td>${minUMA.toFixed(2)}</td><td>${maxUMA.toFixed(2)}</td>
                    <td>$${(minUMA*uma).toLocaleString('es-AR')}</td><td>$${(maxUMA*uma).toLocaleString('es-AR')}</td></tr>`;
            }
        }

        html += `<h4>Patrocinante</h4>
         <table>
             <tr><th>Etapas</th><th>Mínimo UMA</th><th>Máximo UMA</th><th>Mínimo $</th><th>Máximo $</th></tr>
             ${mostrarFila("Juicio completo", calc.patrocinante.full.min, calc.patrocinante.full.max, calc.patrocinante.full.min*uma, calc.patrocinante.full.max*uma, true)}
             ${mostrarFila("Una etapa (1/3)", calc.patrocinante.uno.min, calc.patrocinante.uno.max, calc.patrocinante.uno.min*uma, calc.patrocinante.uno.max*uma)}
             ${mostrarFila("Dos etapas (2/3)", calc.patrocinante.dos.min, calc.patrocinante.dos.max, calc.patrocinante.dos.min*uma, calc.patrocinante.dos.max*uma)}
         </table>
         <h4>Apoderado (+40%)</h4>
         <table>
             <tr><th>Etapas</th><th>Mínimo UMA</th><th>Máximo UMA</th><th>Mínimo $</th><th>Máximo $</th></tr>
             ${mostrarFila("Juicio completo", calc.apoderado.full.min, calc.apoderado.full.max, calc.apoderado.full.min*uma, calc.apoderado.full.max*uma)}
             ${mostrarFila("Una etapa", calc.apoderado.uno.min, calc.apoderado.uno.max, calc.apoderado.uno.min*uma, calc.apoderado.uno.max*uma)}
         </table>
         <h4>Auxiliares (5% y 10% base)</h4>
         <table>
             <tr><th>Mínimo UMA</th><th>Máximo UMA</th><th>Mínimo $</th><th>Máximo $</th></tr>
             <tr><td>${calc.auxMin.toFixed(2)}</td><td>${calc.auxMax.toFixed(2)}</td><td>$${(calc.auxMin*uma).toLocaleString('es-AR')}</td><td>$${(calc.auxMax*uma).toLocaleString('es-AR')}</td></tr>
         </table>`;
        document.getElementById('resultadosDinamicos').innerHTML = html;

        const chkProv = document.getElementById('chkProvisorio');
        const chkGest = document.getElementById('chkGestor');
        if (chkProv) chkProv.addEventListener('change', (e) => { wizardState.esProvisorio = e.target.checked; calcularFinal(); });
        if (chkGest) chkGest.addEventListener('change', (e) => { wizardState.esGestor = e.target.checked; calcularFinal(); });
    }

    function attachStepEvents() {
        document.getElementById('btnNext')?.addEventListener('click', () => {
            if (wizardState.step === 5) return;
            recolectarDatos();

            // Saltos especiales
            if (wizardState.step === 1) {
                if (wizardState.tipoProceso === 'exhorto') {
                    wizardState.step = 5;
                    renderScreen();
                    return;
                }
                if (wizardState.tipoProceso === 'incidente') {
                    wizardState.step = 4;
                    renderScreen();
                    return;
                }
                if (wizardState.tipoProceso === 'medida_cautelar') {
                    wizardState.step = 2;
                    renderScreen();
                    return;
                }
            }
            if (wizardState.step === 2 && (wizardState.tipoProceso === 'exhorto' || wizardState.tipoProceso === 'incidente')) {
                wizardState.step = 4;
                renderScreen();
                return;
            }
            if (wizardState.step === 2 && wizardState.tipoProceso !== 'conocimiento') {
                wizardState.step = 4;
                renderScreen();
                return;
            }
            wizardState.step++;
            if (wizardState.step >= steps.length) wizardState.step = steps.length-1;
            renderScreen();
        });
        document.getElementById('btnBack')?.addEventListener('click', () => {
            if (wizardState.step > 0) {
                wizardState.step--;
                renderScreen();
            }
        });
        document.getElementById('btnReset')?.addEventListener('click', () => {
            wizardState = {
                step: 0, valorUMA: wizardState.valorUMA, tipoProceso: '', modoTerminacion: '', sentenciaResultado: null,
                aperturaPrueba: null, caducidadCriterio: '', tuvoExcepciones: null, sucesionUnicoLetrado: false,
                medidaOposicion: null, homologacionVivienda: false, objetoBase: '', desalojoVivienda: false,
                baseValor: 0, esProvisorio: false, etapasRealizadas: 3, esGestor: false
            };
            renderScreen();
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        cargarUMA();
        renderScreen();
    });
</script>
</body>
</html>
