<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Asistente Legal · Honorarios Ley 27.423</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f4f8;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      padding: 24px 20px;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      background: white;
      padding: 14px 24px;
      border-radius: 60px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      margin-bottom: 28px;
      font-weight: 500;
    }

    .breadcrumb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4b5563;
      font-size: 0.85rem;
    }

    .breadcrumb-item.active {
      color: #1e4a76;
      font-weight: 700;
      background: #e6f0fa;
      padding: 5px 12px;
      border-radius: 40px;
    }

    .breadcrumb-sep {
      color: #9ca3af;
      font-size: 1rem;
    }

    /* Two columns */
    .dashboard {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
    }

    .wizard-col {
      flex: 2;
      min-width: 280px;
    }

    .sidebar-col {
      flex: 1.2;
      min-width: 260px;
    }

    /* Cards */
    .card {
      background: white;
      border-radius: 32px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      overflow: hidden;
      transition: all 0.2s;
    }

    .card-header {
      padding: 20px 28px 8px 28px;
      font-weight: 700;
      font-size: 1.3rem;
      border-bottom: 1px solid #eef2ff;
      color: #0f3b5c;
    }

    .card-content {
      padding: 20px 28px 28px 28px;
    }

    /* Fundamento sidecar */
    .fundamento-card {
      background: #fefdf7;
      border-left: 5px solid #eab308;
      border-radius: 28px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05);
      position: sticky;
      top: 20px;
    }

    .fundamento-title {
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      color: #92400e;
    }

    .fundamento-text {
      font-size: 0.9rem;
      line-height: 1.5;
      color: #2d3e2b;
      background: #fff9e8;
      padding: 16px;
      border-radius: 20px;
      margin-top: 8px;
    }

    /* Opciones */
    .options-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 16px 0 12px;
    }

    .opt-btn {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .opt-btn.selected {
      background: #1e4a76;
      color: white;
      border-color: #1e4a76;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .numeric-input {
      width: 100%;
      max-width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 48px;
      margin: 12px 0 8px;
      background: white;
    }

    .info-note, .legal-note {
      background: #f8fafc;
      border-left: 4px solid #3b82f6;
      padding: 10px 16px;
      font-size: 0.8rem;
      border-radius: 16px;
      margin: 12px 0;
    }

    .warning-box {
      background: #fff0f0;
      border-left: 5px solid #dc2626;
      padding: 14px 18px;
      border-radius: 20px;
      margin-bottom: 20px;
      font-size: 0.85rem;
    }

    .btn-nav {
      background: #1e4a76;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      margin-right: 12px;
    }

    .btn-nav.secondary {
      background: #475569;
    }

    .btn-nav.danger {
      background: #b91c1c;
    }

    .results-box {
      background: #f8fafc;
      border-radius: 24px;
      padding: 20px;
      margin-top: 24px;
      border: 1px solid #e2e8f0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    th, td {
      border: 1px solid #cbd5e1;
      padding: 8px 10px;
      text-align: left;
    }

    th {
      background: #eef2ff;
    }

    @media (max-width: 800px) {
      .dashboard { flex-direction: column; }
      .breadcrumb { justify-content: center; }
      .card-content { padding: 18px; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Breadcrumb dinámico -->
  <div class="breadcrumb" id="breadcrumbContainer"></div>

  <div class="dashboard">
    <!-- Columna principal del asistente -->
    <div class="wizard-col">
      <div class="card">
        <div class="card-header">⚖️ Asistente de regulación · Ley 27.423</div>
        <div class="card-content" id="wizardContent">
          <!-- Aquí se renderiza el paso actual -->
        </div>
        <div style="padding: 8px 28px 28px 28px; display: flex; gap: 12px; flex-wrap: wrap;">
          <button id="prevWizBtn" class="btn-nav secondary" style="display: none;">◀ Anterior</button>
          <button id="nextWizBtn" class="btn-nav">Siguiente ▶</button>
          <button id="resetWizBtn" class="btn-nav danger">Reiniciar asistente</button>
        </div>
        <div id="wizardResults" class="results-box" style="margin: 0 28px 28px 28px; display: none;"></div>
      </div>
    </div>

    <!-- Sidebar: fundamentos en tiempo real -->
    <div class="sidebar-col">
      <div class="fundamento-card card">
        <div class="card-content">
          <div class="fundamento-title">
            <span>📖 Fundamento legal</span>
          </div>
          <div id="dynamicFundamento" class="fundamento-text">
            Seleccioná una opción para ver el artículo y la explicación correspondiente.
          </div>
          <div class="info-note" style="margin-top: 20px;">
            ⚡ Esta herramienta respeta la escala del art. 21 y las reducciones de la Ley 27.423. No sustituye criterio judicial.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ---------- CARGA UMA ----------
  let valorUMA = 0;
  async function cargarUMA() {
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8tumvxptTGBCfScMwWxK7r6ATnGfMw061GKGdzfIVyThcSGzUqjI-vcpME1AtykPmjqTq0xdjgc7D/pub?output=csv';
    try {
      const response = await fetch(url);
      const data = await response.text();
      const filas = data.split('\n');
      const columnas = filas[0].split(',');
      let valor = columnas[1]?.replace(/"/g, '').trim();
      if (valor && !isNaN(parseFloat(valor))) {
        valorUMA = parseFloat(valor);
      } else throw new Error();
    } catch(e) {
      valorUMA = 0;
    }
  }

  // ---------- NÚCLEO DE CÁLCULO (grupos exactos de la calculadora original) ----------
  function parseNumber(str) { return parseFloat(String(str).replace(/\./g, '').replace(',', '.')); }
  function formatNumber(num) { if (isNaN(num)) return 'N/A'; return num.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  function calcularHonorariosPorGrupo(basePesos, valorUMA, grupo) {
    if (!basePesos || !valorUMA || valorUMA <= 0) return null;
    let baseEnUMA = basePesos / valorUMA;
    let minComp, maxComp, tituloEscala;
    if (baseEnUMA <= 15) { tituloEscala = "1ª escala (hasta 15 UMA): 22% a 33%"; minComp = baseEnUMA * 0.22; maxComp = baseEnUMA * 0.33; }
    else if (baseEnUMA <= 45) { tituloEscala = "2ª escala (16-45 UMA): 20% a 26%"; minComp = (baseEnUMA-15)*0.20 + 4.95; maxComp = (baseEnUMA-15)*0.26 + 4.95; }
    else if (baseEnUMA <= 90) { tituloEscala = "3ª escala (46-90 UMA): 18% a 24%"; minComp = (baseEnUMA-45)*0.18 + 11.7; maxComp = (baseEnUMA-45)*0.24 + 11.7; }
    else if (baseEnUMA <= 150) { tituloEscala = "4ª escala (91-150 UMA): 17% a 22%"; minComp = (baseEnUMA-90)*0.17 + 21.6; maxComp = (baseEnUMA-90)*0.22 + 21.6; }
    else if (baseEnUMA <= 450) { tituloEscala = "5ª escala (151-450 UMA): 15% a 20%"; minComp = (baseEnUMA-150)*0.15 + 33; maxComp = (baseEnUMA-150)*0.20 + 33; }
    else if (baseEnUMA <= 750) { tituloEscala = "6ª escala (451-750 UMA): 13% a 17%"; minComp = (baseEnUMA-450)*0.13 + 90; maxComp = (baseEnUMA-450)*0.17 + 90; }
    else { tituloEscala = "7ª escala (+750 UMA): 12% a 15%"; minComp = (baseEnUMA-750)*0.12 + 127.5; maxComp = (baseEnUMA-750)*0.15 + 127.5; }

    if (grupo === 'grupo2') { minComp /= 2; maxComp /= 2; }
    else if (grupo === 'grupo3') { minComp /= 4; maxComp /= 4; }
    else if (grupo === 'grupo4') { minComp *= 0.7; maxComp *= 0.7; }
    else if (grupo === 'grupo5') { minComp *= 0.9; maxComp *= 0.9; }
    else if (grupo === 'grupo6') { minComp *= 0.45; maxComp *= 0.45; }

    const auxMin = baseEnUMA * 0.05;
    const auxMax = baseEnUMA * 0.10;
    const etapaUnMin = minComp / 3;
    const etapaUnMax = maxComp / 3;
    const etapaDosMin = etapaUnMin * 2;
    const etapaDosMax = etapaUnMax * 2;

    return {
      tituloEscala, baseEnUMA,
      patrocinante: { full: { min: minComp, max: maxComp }, uno: { min: etapaUnMin, max: etapaUnMax }, dos: { min: etapaDosMin, max: etapaDosMax } },
      apoderado: { full: { min: minComp * 1.4, max: maxComp * 1.4 }, uno: { min: etapaUnMin * 1.4, max: etapaUnMax * 1.4 }, dos: { min: etapaDosMin * 1.4, max: etapaDosMax * 1.4 } },
      auxMin, auxMax
    };
  }

  function calcularExhortoIncidente(tipo, valorUMA, baseIngresada = 0) {
    if (tipo === 'exhorto_notif') return { tipo: "Exhorto - notificaciones (art.50 inc.a)", minUMA: 3, maxUMA: 3, minPesos: valorUMA * 3, maxPesos: valorUMA * 3 };
    if (tipo === 'exhorto_inscrip') return { tipo: "Exhorto - inscripciones/actos registrales (inc.b)", minUMA: 10, maxUMA: 20, minPesos: valorUMA * 10, maxPesos: valorUMA * 20 };
    if (tipo === 'exhorto_prueba') return { tipo: "Exhorto - diligencias de prueba (inc.c)", minUMA: 7, maxUMA: 30, minPesos: valorUMA * 7, maxPesos: valorUMA * 30 };
    if (tipo === 'incidente') {
      const baseUMA = baseIngresada / valorUMA;
      const minUMA = baseUMA * 0.02;
      const maxUMA = baseUMA * 0.20;
      return { tipo: "Incidente / BLSG (art.33 ley 21839)", minUMA, maxUMA, minPesos: minUMA * valorUMA, maxPesos: maxUMA * valorUMA };
    }
    return null;
  }

  // ---------- ASISTENTE CON BREADCRUMB Y SIDECAR ----------
  let wizardState = {
    step: 0,
    provisional: false,
    etapasRealizadas: 'completo',
    tipoJuicio: null,
    hayReconvencion: false,
    principal: {
      base: 0,
      resultado: null,
      aperturaPrueba: null,
      caducidadModo: null,
      sentenciaResultado: null,
      tieneExcepciones: false,
      sucesionUnicoLetrado: false,
      medidaOposicion: null,
      desalojoVivienda: false,
      ejecucionSinExcepciones: false,
      homologacionVivienda: false,
      tipoExhorto: null
    },
    reconvencionData: null,
    valorUMA: 0
  };

  // Mapeo de pasos a breadcrumb
  const breadcrumbMap = [
    { label: "Observaciones", steps: [0, 1] },
    { label: "Tipo de juicio", steps: [2, 3] },
    { label: "Base regulatoria", steps: [4] },
    { label: "Terminación", steps: [5, 6] },
    { label: "Resultado final", steps: [7, 8] }
  ];

  function updateBreadcrumb() {
    const currentStep = wizardState.step;
    const container = document.getElementById('breadcrumbContainer');
    if (!container) return;
    let html = '';
    breadcrumbMap.forEach((crumb, idx) => {
      const isActive = crumb.steps.includes(currentStep);
      const isPast = crumb.steps.some(s => s < currentStep);
      html += `<div class="breadcrumb-item ${isActive ? 'active' : ''}">${isPast ? '✓' : ''} ${crumb.label}</div>`;
      if (idx < breadcrumbMap.length - 1) html += `<span class="breadcrumb-sep">›</span>`;
    });
    container.innerHTML = html;
  }

  // Mapa de fundamentos dinámicos (por elección)
  function updateFundamento(optionKey, extra = '') {
    const container = document.getElementById('dynamicFundamento');
    if (!container) return;
    const textos = {
      provisorio: "📘 <strong>Art. 12</strong> — Honorarios provisorios: cuando el profesional se aparta antes de la conclusión normal o la causa está paralizada >1 año por causas ajenas. Solo se abona el <strong>mínimo de las etapas cumplidas</strong>.",
      definitivo: "📘 <strong>Art. 12 in fine</strong> — Honorarios definitivos: corresponden cuando el proceso ha concluido o se regula en sentencia firme. Se aplica la escala completa con sus mínimos y máximos.",
      desalojo_vivienda: "🏠 <strong>Art. 40</strong> — Si la locación es para vivienda, la base regulatoria (total de alquileres) se reduce en un <strong>20%</strong>. Fundamento: protección de la vivienda única.",
      ejecutivo_sin_excepciones: "⚡ <strong>Art. 34</strong> — En juicio ejecutivo sin oposición de excepciones, los honorarios se reducen en un <strong>10%</strong> de la escala ordinaria.",
      medida_cautelar_sin_oposicion: "🛡️ <strong>Art. 37</strong> — Medida cautelar sin oposición: la base se reduce al <strong>25%</strong> de la escala. Si hay oposición → 50%.",
      ejecucion_sentencia_sin_excepciones: "📜 <strong>Art. 41 + 34</strong> — Ejecución de sentencia: base = 50% de la escala. Si no hay excepciones, adicional -10% → total 45%.",
      sucesion_unico_letrado: "👥 <strong>Art. 35</strong> — Sucesión con un solo letrado para todos los herederos: los honorarios se reducen a la <strong>mitad</strong> de la escala.",
      sentencia_desestimada: "⚖️ <strong>Art. 22</strong> — Si la demanda es íntegramente desestimada, la base regulatoria se reduce en un <strong>30%</strong>.",
      caducidad_como_desestimada: "⏳ <strong>Art. 22 (analogía)</strong> — Tratando la caducidad como demanda desestimada, se aplica reducción del 30% sobre la base.",
      terminacion_anormal_sin_prueba: "📉 <strong>Art. 25</strong> — Desistimiento, transacción o caducidad (modo anormal) antes de apertura a prueba: honorarios = <strong>50%</strong> de la escala.",
      homologacion_desocupacion: "🏢 <strong>Art. 40 2° párrafo</strong> — Homologación de convenio de desocupación y su ejecución: honorarios = <strong>50%</strong> de la escala (ya calculada con posible reducción por vivienda).",
      exhorto_notificaciones: "📬 <strong>Art. 50 inc. a</strong> — Diligenciamiento de exhortos por notificaciones: mínimo 3 UMA.",
      exhorto_inscripciones: "📝 <strong>Art. 50 inc. b</strong> — Inscripciones registrales: entre 10 y 20 UMA.",
      exhorto_prueba: "🔍 <strong>Art. 50 inc. c</strong> — Diligencias de prueba: entre 7 y 30 UMA.",
      incidente: "⚙️ <strong>Art. 33 ley 21839</strong> — Incidentes: entre el 2% y el 20% del valor de la incidencia o del juicio principal."
    };
    let text = textos[optionKey] || "Seleccioná una opción para ver el fundamento legal detallado.";
    if (extra) text += `<br><br><small>${extra}</small>`;
    container.innerHTML = text;
  }

  // render del paso actual (simplificado pero con eventos)
  let currentStepRender = 0;
  function renderWizardStep() {
    const step = wizardState.step;
    const container = document.getElementById('wizardContent');
    if (!container) return;
    let html = '';
    if (step === 0) { // Intro + advertencias
      html = `<div class="warning-box">⚠️ <strong>Herramienta de referencia</strong> — basada en Ley 27.423. No reemplaza el criterio judicial. Se aplica a juicios desde el 22/12/2017 o por precedente "Las Marías".<br>No contempla mínimos arancelarios (arts.58,61) ni reducciones especiales (art.730 CCyC, etc.).</div>
      <div class="legal-note">📌 Este asistente lo guiará paso a paso. Cada elección actualiza el cuadro de fundamentos.</div>`;
      updateFundamento('definitivo', 'Bienvenida: defina la modalidad de honorarios en el siguiente paso.');
    } else if (step === 1) {
      html = `<div><strong>¿Honorarios definitivos o provisorios?</strong></div>
      <div class="options-group"><div class="opt-btn ${!wizardState.provisional ? 'selected' : ''}" data-choice="definitivo">✅ Honorarios definitivos</div>
      <div class="opt-btn ${wizardState.provisional ? 'selected' : ''}" data-choice="provisorio">⏳ Honorarios provisorios (art.12)</div></div>
      <div class="legal-note">Art.12: provisorios solo por el mínimo de las etapas efectivamente cumplidas.</div>`;
    } else if (step === 2) {
      const tipos = ['ordinario','sumarísimo','desalojo','ejecutivo','sucesion','ejecucion_sentencia','medida_cautelar','homologacion_desocupacion','exhorto','incidente'];
      html = `<div><strong>Tipo de juicio</strong> (determina reducciones específicas)</div>
      <div class="options-group" id="tipoGroup">${tipos.map(t => `<div class="opt-btn ${wizardState.tipoJuicio===t?'selected':''}" data-tipo="${t}">${t.replace(/_/g,' ').toUpperCase()}</div>`).join('')}</div>`;
    } else if (step === 3) {
      if (wizardState.tipoJuicio !== 'ordinario') {
        html = `<p>No aplica reconvención (solo procesos ordinarios).</p><button id="skipReconBtn" class="btn-nav secondary">Continuar</button>`;
      } else {
        html = `<div><strong>¿Existe reconvención?</strong> (art.28)</div>
        <div class="options-group"><div class="opt-btn ${wizardState.hayReconvencion===true?'selected':''}" data-recon="si">Sí, regular por separado</div>
        <div class="opt-btn ${wizardState.hayReconvencion===false?'selected':''}" data-recon="no">No</div></div>`;
      }
    } else if (step === 4) { // Base y ajustes específicos
      html = `<div><strong>Base regulatoria y ajustes</strong><br><input type="text" id="baseInputDynamic" class="numeric-input" placeholder="Ingrese el monto en pesos"></div>`;
      const t = wizardState.tipoJuicio;
      if (t === 'desalojo') html += `<div class="options-group"><div class="opt-btn" data-ajuste="desalojo_vivienda">📍 Locación vivienda → -20%</div><div class="opt-btn" data-ajuste="desalojo_no_vivienda">Otros destinos → 100%</div></div>`;
      if (t === 'ejecutivo') html += `<div class="options-group"><div class="opt-btn" data-ajuste="ejecutivo_sin_excepciones">Sin excepciones → -10%</div><div class="opt-btn" data-ajuste="ejecutivo_con_excepciones">Con excepciones → escala normal</div></div>`;
      if (t === 'medida_cautelar') html += `<div class="options-group"><div class="opt-btn" data-ajuste="medida_con_oposicion">Con oposición → 50% escala</div><div class="opt-btn" data-ajuste="medida_sin_oposicion">Sin oposición → 25% escala</div></div>`;
      if (t === 'sucesion') html += `<div class="options-group"><div class="opt-btn" data-ajuste="sucesion_unico">Un solo letrado → 50%</div><div class="opt-btn" data-ajuste="sucesion_varios">Varios letrados → escala completa</div></div>`;
      if (t === 'ejecucion_sentencia') html += `<div class="options-group"><div class="opt-btn" data-ajuste="ejecucion_con_excepciones">Con excepciones → 50%</div><div class="opt-btn" data-ajuste="ejecucion_sin_excepciones">Sin excepciones → 45%</div></div>`;
      if (t === 'homologacion_desocupacion') html += `<div class="options-group"><div class="opt-btn" data-ajuste="homologacion_vivienda">Es vivienda → -20% + homologación 50%</div><div class="opt-btn" data-ajuste="homologacion_no_vivienda">No vivienda → solo homologación 50%</div></div>`;
      if (t === 'exhorto') html += `<div class="options-group"><div class="opt-btn" data-ajuste="exhorto_notif">Notificaciones (3 UMA)</div><div class="opt-btn" data-ajuste="exhorto_inscrip">Inscripciones (10-20 UMA)</div><div class="opt-btn" data-ajuste="exhorto_prueba">Diligencias prueba (7-30 UMA)</div></div>`;
      if (t === 'incidente') html += `<div class="legal-note">Incidente: se calculará entre 2% y 20% del valor ingresado (art.33 ley 21839).</div>`;
      html += `<div class="info-note">Si hay múltiples pretensiones, sume los montos en un único valor.</div>`;
    } else if (step === 5) { // Resultado / terminación
      html = `<div><strong>¿Cómo terminó el juicio?</strong></div>
      <div class="options-group"><div class="opt-btn" data-terminacion="sentencia">Sentencia</div><div class="opt-btn" data-terminacion="caducidad">Caducidad</div><div class="opt-btn" data-terminacion="desistimiento">Desistimiento</div><div class="opt-btn" data-terminacion="transaccion">Transacción</div></div>`;
      if (wizardState.principal.resultado === 'sentencia') {
        html += `<div class="options-group" style="margin-top:12px;"><div class="opt-btn" data-sentencia="acoge">Hace lugar a demanda</div><div class="opt-btn" data-sentencia="rechaza">Desestima demanda (art.22 -30% base)</div></div>`;
      }
      if (wizardState.principal.resultado === 'caducidad') {
        html += `<div class="options-group"><div class="opt-btn" data-caducidad="desestimada">Como demanda desestimada (-30%)</div><div class="opt-btn" data-caducidad="art25">Modo anormal (art.25)</div></div>`;
      }
    } else if (step === 6) { // Apertura a prueba
      if (['desistimiento','transaccion'].includes(wizardState.principal.resultado) || (wizardState.principal.resultado === 'caducidad' && wizardState.principal.caducidadModo === 'art25')) {
        html = `<div><strong>¿Se abrió a prueba antes de la terminación?</strong></div>
        <div class="options-group"><div class="opt-btn" data-prueba="si">Sí → 100% escala</div><div class="opt-btn" data-prueba="no">No → 50% escala (art.25)</div></div>`;
      } else { html = `<p>No aplica apertura a prueba para esta terminación.</p><button id="skipAperturaBtn" class="btn-nav secondary">Continuar</button>`; }
    } else if (step === 7) {
      if (!wizardState.provisional) {
        html = `<p>Honorarios definitivos → se mostrarán todas las etapas.</p><button id="skipEtapasBtn" class="btn-nav secondary">Continuar</button>`;
      } else {
        html = `<div><strong>Etapas cumplidas (art.12 provisorio)</strong></div>
        <div class="options-group"><div class="opt-btn" data-etapa="uno">Una etapa (1/3)</div><div class="opt-btn" data-etapa="dos">Dos etapas (2/3)</div><div class="opt-btn" data-etapa="completo">Todas las etapas</div></div>`;
      }
    } else if (step === 8) {
      html = `<p>🔄 Procesando datos, presione "Calcular" para obtener la regulación final.</p>`;
    }
    container.innerHTML = html;
    attachStepEvents();
  }

  function attachStepEvents() {
    // Eventos dinámicos para opciones
    document.querySelectorAll('.opt-btn[data-choice]').forEach(btn => {
      btn.onclick = () => { wizardState.provisional = (btn.dataset.choice === 'provisorio'); updateFundamento(btn.dataset.choice); renderWizardStep(); };
    });
    document.querySelectorAll('.opt-btn[data-tipo]').forEach(btn => {
      btn.onclick = () => { wizardState.tipoJuicio = btn.dataset.tipo; updateFundamento(btn.dataset.tipo); renderWizardStep(); };
    });
    document.querySelectorAll('.opt-btn[data-recon]').forEach(btn => {
      btn.onclick = () => { wizardState.hayReconvencion = (btn.dataset.recon === 'si'); updateFundamento(btn.dataset.recon === 'si' ? 'reconvencion' : 'sin_reconvencion'); renderWizardStep(); };
    });
    document.querySelectorAll('.opt-btn[data-ajuste]').forEach(btn => {
      btn.onclick = () => { 
        const ajuste = btn.dataset.ajuste;
        if (ajuste === 'desalojo_vivienda') wizardState.principal.desalojoVivienda = true;
        if (ajuste === 'ejecutivo_sin_excepciones') wizardState.principal.tieneExcepciones = false;
        if (ajuste === 'medida_sin_oposicion') wizardState.principal.medidaOposicion = false;
        if (ajuste === 'medida_con_oposicion') wizardState.principal.medidaOposicion = true;
        if (ajuste === 'sucesion_unico') wizardState.principal.sucesionUnicoLetrado = true;
        if (ajuste === 'ejecucion_sin_excepciones') wizardState.principal.ejecucionSinExcepciones = true;
        if (ajuste === 'homologacion_vivienda') wizardState.principal.homologacionVivienda = true;
        if (ajuste.startsWith('exhorto')) wizardState.principal.tipoExhorto = ajuste;
        updateFundamento(ajuste);
        renderWizardStep();
      };
    });
    document.querySelectorAll('.opt-btn[data-terminacion]').forEach(btn => {
      btn.onclick = () => { wizardState.principal.resultado = btn.dataset.terminacion; renderWizardStep(); };
    });
    document.querySelectorAll('.opt-btn[data-sentencia]').forEach(btn => {
      btn.onclick = () => { wizardState.principal.sentenciaResultado = btn.dataset.sentencia; updateFundamento('sentencia_desestimada'); renderWizardStep(); };
    });
    document.querySelectorAll('.opt-btn[data-caducidad]').forEach(btn => {
      btn.onclick = () => { wizardState.principal.caducidadModo = btn.dataset.caducidad; updateFundamento('caducidad_como_desestimada'); renderWizardStep(); };
    });
    document.querySelectorAll('.opt-btn[data-prueba]').forEach(btn => {
      btn.onclick = () => { wizardState.principal.aperturaPrueba = (btn.dataset.prueba === 'si'); updateFundamento('terminacion_anormal_sin_prueba'); renderWizardStep(); };
    });
    document.querySelectorAll('.opt-btn[data-etapa]').forEach(btn => {
      btn.onclick = () => { wizardState.etapasRealizadas = btn.dataset.etapa; renderWizardStep(); };
    });
    document.getElementById('skipReconBtn')?.addEventListener('click', () => { wizardState.hayReconvencion = false; wizardState.step++; renderWizardStep(); updateBreadcrumb(); });
    document.getElementById('skipAperturaBtn')?.addEventListener('click', () => { wizardState.step++; renderWizardStep(); updateBreadcrumb(); });
    document.getElementById('skipEtapasBtn')?.addEventListener('click', () => { wizardState.step++; renderWizardStep(); updateBreadcrumb(); });
  }

  function calcularFinal() {
    let baseInput = document.getElementById('baseInputDynamic')?.value;
    let base = parseNumber(baseInput) || 0;
    if (!base) { alert("Por favor ingrese una base regulatoria válida (números)."); return; }
    let grupo = 'grupo1';
    const tipo = wizardState.tipoJuicio;
    if (tipo === 'ejecutivo' && wizardState.principal.tieneExcepciones === false) grupo = 'grupo5';
    else if (tipo === 'ejecucion_sentencia') grupo = wizardState.principal.ejecucionSinExcepciones ? 'grupo6' : 'grupo2';
    else if (tipo === 'medida_cautelar') grupo = wizardState.principal.medidaOposicion ? 'grupo2' : 'grupo3';
    else if (tipo === 'homologacion_desocupacion') grupo = 'grupo2';
    else if (tipo === 'sucesion' && wizardState.principal.sucesionUnicoLetrado) grupo = 'grupo2';
    else if (wizardState.principal.sentenciaResultado === 'rechaza') grupo = 'grupo4';
    else if (wizardState.principal.caducidadModo === 'desestimada') grupo = 'grupo4';
    else if ((wizardState.principal.resultado === 'desistimiento' || wizardState.principal.resultado === 'transaccion') && wizardState.principal.aperturaPrueba === false) grupo = 'grupo2';
    
    if (tipo === 'exhorto' || tipo === 'incidente') {
      let exh = wizardState.principal.tipoExhorto || 'exhorto_notif';
      if (tipo === 'incidente') exh = 'incidente';
      const resEsp = calcularExhortoIncidente(exh, valorUMA, base);
      const resDiv = document.getElementById('wizardResults');
      resDiv.style.display = 'block';
      resDiv.innerHTML = `<h3>${resEsp.tipo}</h3><p>Mínimo: ${formatNumber(resEsp.minPesos)} $ (${formatNumber(resEsp.minUMA)} UMA)<br>Máximo: ${formatNumber(resEsp.maxPesos)} $ (${formatNumber(resEsp.maxUMA)} UMA)</p>`;
      return;
    }
    const calc = calcularHonorariosPorGrupo(base, valorUMA, grupo);
    if (!calc) return;
    let htmlRes = `<h3>Base: $${formatNumber(base)} (${formatNumber(calc.baseEnUMA)} UMA)</h3><p>Escala: ${calc.tituloEscala} · Grupo ${grupo}</p>`;
    htmlRes += `<h4>Patrocinante</h4><tr><th>Etapas</th><th>Mín UMA</th><th>Máx UMA</th><th>Mín $</th><th>Máx $</th></tr>`;
    htmlRes += `<tr><td>Completo</td><td>${formatNumber(calc.patrocinante.full.min)}</td><td>${formatNumber(calc.patrocinante.full.max)}</td><td>${formatNumber(calc.patrocinante.full.min*valorUMA)}</td><td>${formatNumber(calc.patrocinante.full.max*valorUMA)}</td></tr>`;
    htmlRes += `<tr><td>Una etapa</td><td>${formatNumber(calc.patrocinante.uno.min)}</td><td>${formatNumber(calc.patrocinante.uno.max)}</td><td>${formatNumber(calc.patrocinante.uno.min*valorUMA)}</td><td>${formatNumber(calc.patrocinante.uno.max*valorUMA)}</td></tr>`;
    htmlRes += `<tr><td>Dos etapas</td><td>${formatNumber(calc.patrocinante.dos.min)}</td><td>${formatNumber(calc.patrocinante.dos.max)}</td><td>${formatNumber(calc.patrocinante.dos.min*valorUMA)}</td><td>${formatNumber(calc.patrocinante.dos.max*valorUMA)}</td></tr>`;
    htmlRes += `</table><h4>Apoderado (+40%)</h4><table><th>Completo</th><td>${formatNumber(calc.apoderado.full.min)} UMA</td><td>${formatNumber(calc.apoderado.full.max)} UMA</td><td>${formatNumber(calc.apoderado.full.min*valorUMA)} $</td><td>${formatNumber(calc.apoderado.full.max*valorUMA)} $</td></table>`;
    htmlRes += `<p><strong>Auxiliares:</strong> ${formatNumber(calc.auxMin)} UMA ($${formatNumber(calc.auxMin*valorUMA)}) - ${formatNumber(calc.auxMax)} UMA ($${formatNumber(calc.auxMax*valorUMA)})</p>`;
    if (wizardState.provisional) {
      let factor = wizardState.etapasRealizadas === 'uno' ? 1/3 : (wizardState.etapasRealizadas === 'dos' ? 2/3 : 1);
      htmlRes = `<div class="warning-box">Honorarios provisorios (art.12) · etapa ${wizardState.etapasRealizadas}. Mínimo patrocinante: ${formatNumber(calc.patrocinante.full.min*factor)} UMA ($${formatNumber(calc.patrocinante.full.min*factor*valorUMA)})</div>`;
    }
    document.getElementById('wizardResults').innerHTML = htmlRes;
    document.getElementById('wizardResults').style.display = 'block';
  }

  function nextStep() {
    if (wizardState.step < 8) { wizardState.step++; renderWizardStep(); updateBreadcrumb(); }
    else { calcularFinal(); }
  }
  function prevStep() { if (wizardState.step > 0) { wizardState.step--; renderWizardStep(); updateBreadcrumb(); } }
  function resetWizard() { wizardState = { step:0, provisional:false, etapasRealizadas:'completo', tipoJuicio:null, hayReconvencion:false, principal:{ base:0, resultado:null, aperturaPrueba:null, caducidadModo:null, sentenciaResultado:null, tieneExcepciones:false, sucesionUnicoLetrado:false, medidaOposicion:null, desalojoVivienda:false, ejecucionSinExcepciones:false, homologacionVivienda:false, tipoExhorto:null }, reconvencionData:null, valorUMA }; renderWizardStep(); updateBreadcrumb(); document.getElementById('wizardResults').style.display = 'none'; }

  window.addEventListener('DOMContentLoaded', async () => {
    await cargarUMA();
    wizardState.valorUMA = valorUMA;
    renderWizardStep();
    updateBreadcrumb();
    document.getElementById('nextWizBtn').onclick = nextStep;
    document.getElementById('prevWizBtn').onclick = prevStep;
    document.getElementById('resetWizBtn').onclick = resetWizard;
  });
</script>
</body>
</html>
