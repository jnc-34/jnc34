<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistente Honorarios</title>

<style>
body { font-family: Arial; max-width: 900px; margin: auto; padding: 20px; }
.pantalla { display: none; }
.activa { display: block; }
button { margin-top: 15px; padding: 8px 15px; }
.box { margin-top: 10px; }
small { color: gray; }
</style>

</head>
<body>

<h2>Asistente de Honorarios</h2>

<!-- P1 -->
<div id="p1" class="pantalla activa">
  <button onclick="next(2)">Comenzar</button>
</div>

<!-- P2 -->
<div id="p2" class="pantalla">
  <h3>Observaciones</h3>
  <p>
    Este asistente no contempla:
    <br>- Familia
    <br>- Penal
    <br>- Laboral
    <br>- Administrador judicial / interventor
  </p>
  <button onclick="next(3)">Continuar</button>
</div>

<!-- P3 -->
<div id="p3" class="pantalla">
  <h3>Tipo de honorarios</h3>
  <select id="tipoHonorario">
    <option value="definitivos">Definitivos</option>
    <option value="provisorios">Provisorios</option>
  </select>
  <button onclick="guardarTipoHonorario()">Continuar</button>
</div>

<!-- P4 -->
<div id="p4" class="pantalla">
  <h3>Tipo de proceso</h3>
  <select id="tipoProceso">
    <option value="ordinario">Ordinario</option>
    <option value="sumarisimo">Sumarísimo</option>
    <option value="ejecutivo">Ejecutivo</option>
  </select>
  <button onclick="guardarProceso()">Continuar</button>
</div>

<!-- P5 -->
<div id="p5" class="pantalla">
  <h3>Variables</h3>

  <label><input type="checkbox" id="hayPrueba"> Hubo apertura a prueba</label><br>

  <div id="reconvencionBox" style="display:none;">
    <label><input type="checkbox" id="reconvencion"> Hubo reconvención</label>
  </div>

  <button onclick="guardarVariables()">Continuar</button>
</div>

<!-- P6 -->
<div id="p6" class="pantalla">
  <h3>Terminación</h3>
  <select id="terminacion">
    <option value="sentencia">Sentencia</option>
    <option value="desistimiento">Desistimiento</option>
    <option value="transaccion">Transacción</option>
    <option value="allanamiento">Allanamiento</option>
    <option value="caducidad">Caducidad</option>
  </select>
  <button onclick="guardarTerminacion()">Continuar</button>
</div>

<!-- P7 -->
<div id="p7" class="pantalla">
  <h3>Base regulatoria</h3>

  <select id="tipoBase">
    <option value="monto">Monto libre</option>
    <option value="inmueble">Inmueble / mueble</option>
    <option value="credito">Derecho crediticio</option>
    <option value="acciones">Acciones / títulos</option>
    <option value="establecimiento">Establecimiento</option>
    <option value="uso">Uso y habitación</option>
    <option value="escrituracion">Escrituración</option>
    <option value="posesorias">Posesorias / división</option>
    <option value="colectiva">Incidencia colectiva</option>
  </select>

  <input type="number" id="baseMonto" placeholder="Monto">

  <div id="warnings"></div>

  <button onclick="guardarBase()">Continuar</button>
</div>

<!-- P8 -->
<div id="p8" class="pantalla">
  <h3>Resumen</h3>
  <pre id="resumen"></pre>
  <button onclick="calcularFinal()">Calcular</button>
</div>

<!-- P9 -->
<div id="p9" class="pantalla">
  <h3>Resultado</h3>
  <div id="resultado"></div>
</div>

<script src="app.js"></script>

</body>
</html>
