<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Caducidad de Instancia - Art. 310 CPCCN</title>
    <style>
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #718096;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
        }

        #apiStatus {
            text-align: center;
            font-size: 12px;
            margin-bottom: 20px;
            padding: 8px;
            border-radius: 8px;
            background: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
        }

        .custom-months { display: none; margin-top: 15px; }
        .custom-months.show { display: block; }

        .custom-months input {
            width: 100px;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            text-align: center;
        }

        .date-inputs { display: flex; gap: 10px; align-items: center; }
        .date-input-group { flex: 1; }

        .date-input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }

        .date-separator {
            font-size: 24px;
            font-weight: 700;
            color: #cbd5e0;
            padding-top: 20px;
        }

        .buttons { display: flex; gap: 15px; margin-top: 30px; }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-clear {
            background: #f7fafc;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 15px;
            border-left: 5px solid #667eea;
        }

        .result.show { display: block; }

        .result-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .result-date {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .inhabiles-list {
            margin-top: 8px;
            font-size: 12px;
            list-style: none;
            padding-left: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de Caducidad v.1</h1>
    <p class="subtitle">Art. 310 del Código Procesal Civil y Comercial de la Nación</p>
    <div id="apiStatus">Iniciando carga de datos...</div>

    <form id="calculatorForm">
        <div class="form-group">
            <label>Plazo</label>
            <select id="plazo" required>
                <option value="">Seleccione...</option>
                <option value="6">6 meses</option>
                <option value="3">3 meses</option>
                <option value="1">1 mes</option>
            </select>
        </div>

        <div class="form-group">
            <label>Último acto impulsor</label>
            <div class="date-inputs">
                <input id="day" maxlength="2" placeholder="DD" required>
                <span class="date-separator">/</span>
                <input id="month" maxlength="2" placeholder="MM" required>
                <span class="date-separator">/</span>
                <input id="year" maxlength="4" placeholder="AAAA" required>
            </div>
        </div>

        <div class="buttons">
            <button type="submit" class="btn-calculate">Calcular</button>
            <button type="button" class="btn-clear" id="clearBtn">Limpiar</button>
        </div>
    </form>

    <div class="result" id="result">
        <div class="result-title">Cómputo Ordinario</div>
        <div class="result-date" id="resultDate"></div>
        <hr>
        <div class="result-title">Con Feriados</div>
        <div class="result-date" id="resultDateFull"></div>
        <div id="resultDetailsFull"></div>
    </div>
</div>

<script>
const apiStatus = document.getElementById('apiStatus');
const form = document.getElementById('calculatorForm');
const result = document.getElementById('result');
let inhabilesMap = new Map();

/* FIX REAL */
function getISODate(date) {
    const y = date.getFullYear();
    const m = date.getMonth() + 1;
    const d = date.getDate();
    return y + "-" +
        (m < 10 ? "0" + m : m) + "-" +
        (d < 10 ? "0" + d : d);
}

async function initData() {
    let añosCargados = [];
    try {
        const resJson = await fetch('https://raw.githubusercontent.com/jnc-34/jnc34/refs/heads/main/dias-inhabiles.json');
        const dataJson = await resJson.json();
        dataJson.dias_inhabiles.forEach(d => {
            inhabilesMap.set(d.fecha, d.motivo);
        });
        añosCargados.push("JSON");
    } catch {}

    apiStatus.innerText = "Datos cargados";
}
initData();

form.addEventListener('submit', function(e){
    e.preventDefault();
    const d = parseInt(day.value);
    const m = parseInt(month.value);
    const y = parseInt(year.value);
    const plazo = parseInt(plazoSelect());

    const startDate = new Date(y, m - 1, d);
    let ordDate = new Date(startDate);
    ordDate.setMonth(ordDate.getMonth() + plazo);

    document.getElementById('resultDate').innerText = ordDate.toLocaleDateString('es-AR');

    let fullDate = new Date(ordDate);
    let inhabilesList = [];
    let iter = new Date(startDate);
    iter.setDate(iter.getDate() + 1);

    while (iter <= fullDate) {
        let iso = getISODate(iter);
        if (inhabilesMap.has(iso)) {
            inhabilesList.push({fecha: iter.toLocaleDateString('es-AR'), nombre: inhabilesMap.get(iso)});
            fullDate.setDate(fullDate.getDate() + 1);
        }
        iter.setDate(iter.getDate() + 1);
    }

    document.getElementById('resultDateFull').innerText = fullDate.toLocaleDateString('es-AR');
    document.getElementById('resultDetailsFull').innerHTML =
        `<ul class="inhabiles-list">
        ${inhabilesList.map(i => `<li>• ${i.fecha}: ${i.nombre}</li>`).join('')}
        </ul>`;

    result.classList.add('show');
});

function plazoSelect(){ return plazo.value; }
clearBtn.addEventListener('click',()=>{form.reset();result.classList.remove('show');});
</script>

</body>
</html>
