<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Caducidad de Instancia - Art. 310 CPCCN</title>
    <style>
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #718096;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
        }

        #apiStatus {
            text-align: center;
            font-size: 12px;
            margin-bottom: 20px;
            padding: 8px;
            border-radius: 8px;
            background: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            color: #2d3748;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .custom-months { display: none; margin-top: 15px; }
        .custom-months.show { display: block; }

        .custom-months input {
            width: 100px;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            text-align: center;
        }

        .date-inputs { display: flex; gap: 10px; align-items: center; }
        .date-input-group { flex: 1; }

        .date-input-group label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 5px;
        }

        .date-input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            color: #2d3748;
        }

        .date-separator {
            font-size: 24px;
            font-weight: 700;
            color: #cbd5e0;
            padding-top: 20px;
        }

        .buttons { display: flex; gap: 15px; margin-top: 30px; }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-clear {
            background: #f7fafc;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 15px;
            border-left: 5px solid #667eea;
        }

        .result.show { display: block; }

        .result-title {
            color: #2d3748;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .result-date {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .result-details {
            color: #4a5568;
            font-size: 14px;
            line-height: 1.6;
        }

        .hr-divider {
            margin: 20px 0;
            border: 0;
            border-top: 1px solid #cbd5e0;
        }

        details {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            cursor: pointer;
        }

        summary {
            font-weight: 600;
            color: #2d3748;
            font-size: 13px;
        }

        .inhabiles-list {
            margin-top: 8px;
            font-size: 12px;
            color: #4a5568;
            list-style: none;
            padding-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calculadora de Caducidad</h1>
        <p class="subtitle">Art. 310 del Código Procesal Civil y Comercial de la Nación</p>
        <div id="apiStatus">Iniciando carga de datos...</div>

        <!-- EL RESTO ES IDÉNTICO A TU VERSIÓN ORIGINAL -->

    </div>

<script>
let inhabilesMap = new Map();

function getISODate(date) {
    const y = date.getUTCFullYear();
    const m = String(date.getUTCMonth() + 1).padStart(2, '0');
    const d = String(date.getUTCDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}
</script>
</body>
</html>
