<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Caducidad de Instancia - Art. 310 CPCCN</title>
    <style>
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px; width: 100%; padding: 40px;
        }
        h1 { color: #2d3748; font-size: 28px; font-weight: 700; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #718096; font-size: 14px; text-align: center; margin-bottom: 15px; }
        #apiStatus {
            text-align: center; font-size: 12px; margin-bottom: 20px; padding: 8px;
            border-radius: 8px; background: #f1f5f9; color: #475569; font-weight: 600;
        }
        .form-group { margin-bottom: 25px; }
        label { display: block; color: #2d3748; font-weight: 600; font-size: 14px; margin-bottom: 10px; }
        select, input {
            width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 10px;
            font-family: inherit; font-size: 14px; color: #2d3748;
        }
        .date-inputs { display: flex; gap: 10px; align-items: center; }
        .date-input-group { flex: 1; }
        .date-input-group input { text-align: center; font-weight: 600; font-size: 16px; }
        .date-separator { font-size: 24px; font-weight: 700; color: #cbd5e0; padding-top: 15px; }
        .buttons { display: flex; gap: 15px; margin-top: 30px; }
        button {
            flex: 1; padding: 15px; border: none; border-radius: 10px;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-calculate { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-clear { background: #f7fafc; color: #4a5568; border: 2px solid #e2e8f0; }
        .result {
            display: none; margin-top: 30px; padding: 25px;
            background: #f8fafc; border-radius: 15px; border-left: 5px solid #667eea;
        }
        .result.show { display: block; }
        .result-title { color: #2d3748; font-size: 16px; font-weight: 700; margin-bottom: 5px; }
        .result-date { font-size: 32px; font-weight: 700; color: #667eea; margin-bottom: 10px; }
        .result-details { color: #4a5568; font-size: 14px; line-height: 1.6; margin-bottom: 15px; }
        details { background: white; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        summary { font-weight: 600; font-size: 13px; cursor: pointer; }
        .inhabiles-list { list-style: none; padding-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calculadora de Caducidad</h1>
        <p class="subtitle">Art. 310 del Código Procesal Civil y Comercial de la Nación</p>
        <div id="apiStatus">Iniciando base de datos...</div>

        <form id="calculatorForm">
            <div class="form-group">
                <label>Plazo a computar</label>
                <select id="plazo" required>
                    <option value="6">6 meses (Instancia única/primera)</option>
                    <option value="3">3 meses (Segunda instancia/incidentes)</option>
                    <option value="1">1 mes (Incidente de caducidad)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Último acto impulsor</label>
                <div class="date-inputs">
                    <div class="date-input-group"><input type="number" id="day" placeholder="DD" required min="1" max="31"></div>
                    <span class="date-separator">/</span>
                    <div class="date-input-group"><input type="number" id="month" placeholder="MM" required min="1" max="12"></div>
                    <span class="date-separator">/</span>
                    <div class="date-input-group"><input type="number" id="year" placeholder="AAAA" required min="2021" max="2030"></div>
                </div>
            </div>
            <div class="buttons">
                <button type="submit" class="btn-calculate">Calcular</button>
                <button type="button" class="btn-clear" id="clearBtn">Limpiar</button>
            </div>
        </form>

        <div class="result" id="result">
            <div class="result-title">Cómputo Ordinario:</div>
            <div class="result-date" id="resultDate"></div>
            <div class="result-details" id="resultDetails"></div>
            <div class="result-title">Vencimiento Final:</div>
            <div class="result-date" id="resultDateFull"></div>
            <div class="result-details" id="resultDetailsFull"></div>
        </div>
    </div>

    <script>
        let inhabilesMap = new Map();

        // Función para formatear fecha a ISO sin errores de zona horaria
        function toISODate(date) {
            let y = date.getFullYear();
            let m = String(date.getMonth() + 1).padStart(2, '0');
            let d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        async function initData() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/jnc-34/jnc34/refs/heads/main/dias-inhabiles.json');
                const data = await res.json();
                data.dias_inhabiles.forEach(d => inhabilesMap.set(typeof d === 'string' ? d : d.fecha, typeof d === 'string' ? "Inhábil" : d.motivo));
                
                for (let y = 2024; y <= 2026; y++) {
                    const resApi = await fetch(`https://api.argentinadatos.com/v1/feriados/${y}`);
                    if (resApi.ok) {
                        const feriados = await resApi.json();
                        feriados.forEach(f => { if(!inhabilesMap.has(f.fecha)) inhabilesMap.set(f.fecha, f.nombre); });
                    }
                }
                document.getElementById('apiStatus').innerText = "Base de datos cargada y lista.";
            } catch (e) { document.getElementById('apiStatus').innerText = "Error cargando datos."; }
        }
        initData();

        function getFeriaJuly(year) {
            let count = 0, start;
            for (let d = 1; d <= 31; d++) {
                let dt = new Date(year, 6, d);
                if (dt.getDay() === 1) { count++; if (count === 3) { start = dt; break; } }
            }
            let end = new Date(start); end.setDate(start.getDate() + 11);
            return { start, end };
        }

        document.getElementById('calculatorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const start = new Date(document.getElementById('year').value, document.getElementById('month').value - 1, document.getElementById('day').value);
            const plazo = parseInt(document.getElementById('plazo').value);
            
            // 1. Cómputo Ordinario
            let ordDate = new Date(start);
            let obs = [];
            for(let i=0; i<plazo; i++) {
                let dRef = ordDate.getDate();
                ordDate.setMonth(ordDate.getMonth() + 1);
                if(ordDate.getDate() !== dRef) ordDate.setDate(0);
                if(ordDate.getMonth() === 0) { ordDate.setMonth(1); obs.push("Exclusión feria enero"); }
            }
            let fJ = getFeriaJuly(ordDate.getFullYear());
            if (ordDate >= fJ.start) { ordDate.setDate(ordDate.getDate() + 12); obs.push("Adición feria julio (12 días)"); }

            document.getElementById('resultDate').innerText = ordDate.toLocaleDateString('es-AR');
            document.getElementById('resultDetails').innerText = obs.join(" | ");

            // 2. Cómputo Final (Día por día)
            let inhabilesList = [];
            let fullDate = new Date(ordDate);
            let checkPoint = new Date(start);

            let loop = true;
            while(loop) {
                loop = false;
                let iter = new Date(checkPoint);
                iter.setDate(iter.getDate() + 1);

                while(iter <= fullDate) {
                    let iso = toISODate(iter);
                    let isJan = (iter.getMonth() === 0);
                    let fJuly = getFeriaJuly(iter.getFullYear());
                    let isJulyFeria = (iter >= fJuly.start && iter <= fJuly.end);

                    if (inhabilesMap.has(iso)) {
                        let already = inhabilesList.find(x => x.fecha === iter.toLocaleDateString('es-AR'));
                        if (!already) {
                            // SI ESTÁ EN EL JSON/API Y NO ES FERIA AUTOMÁTICA (para no duplicar)
                            // EXCEPCIÓN: Si es diciembre, lo sumamos siempre porque diciembre no es feria.
                            if ((!isJan && !isJulyFeria) || iter.getMonth() === 11) {
                                inhabilesList.push({ fecha: iter.toLocaleDateString('es-AR'), motivo: inhabilesMap.get(iso) });
                                fullDate.setDate(fullDate.getDate() + 1);
                                loop = true;
                            }
                        }
                    }
                    iter.setDate(iter.getDate() + 1);
                }
                checkPoint = new Date(fullDate);
            }

            // 3. Ajuste de fin de semana / feriado en el día de vencimiento
            let finalObs = "";
            let adjust = true;
            while(adjust) {
                adjust = false;
                let isoFinal = toISODate(fullDate);
                let fJulyF = getFeriaJuly(fullDate.getFullYear());
                
                if (fullDate.getDay() === 0 || fullDate.getDay() === 6) {
                    fullDate.setDate(fullDate.getDate() + 1); finalObs = "Ajustado por fin de semana"; adjust = true;
                } else if (fullDate.getMonth() === 0) {
                    fullDate.setMonth(1, 1); finalObs = "Ajustado por feria enero"; adjust = true;
                } else if (fullDate >= fJulyF.start && fullDate <= fJulyF.end) {
                    fullDate.setDate(fJulyF.end.getDate() + 1); finalObs = "Ajustado por feria julio"; adjust = true;
                } else if (inhabilesMap.has(isoFinal)) {
                    fullDate.setDate(fullDate.getDate() + 1); finalObs = "Ajustado por feriado: " + inhabilesMap.get(isoFinal); adjust = true;
                }
            }

            document.getElementById('resultDateFull').innerText = fullDate.toLocaleDateString('es-AR');
            document.getElementById('resultDetailsFull').innerHTML = `Se sumaron <b>${inhabilesList.length} días</b> extra. ${finalObs}
                <details><summary>Ver detalle</summary><ul class="inhabiles-list">${inhabilesList.map(i => `<li>• ${i.fecha}: ${i.motivo}</li>`).join('')}</ul></details>`;
            
            document.getElementById('result').classList.add('show');
        });

        document.getElementById('clearBtn').onclick = () => { document.getElementById('result').classList.remove('show'); document.getElementById('calculatorForm').reset(); };
    </script>
</body>
</html>
